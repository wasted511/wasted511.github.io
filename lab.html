<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime Archive · 神秘实验室 — Y的acg导航站</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="css/style.css?v=5">
  <link rel="stylesheet" href="css/lab.css?v=4">
</head>
<body class="lab-body">

  <!-- Startup Ritual Overlay -->
  <div class="startup-overlay" id="startupOverlay">
    <div class="startup-dot" id="startupDot" style="opacity:0;transform:scale(0.3)"></div>
  </div>

  <!-- Central Pillar -->
  <div class="pillar-bg"></div>
  <div class="pillar-particles" id="pillarParticles"></div>

  <!-- Nav Bar -->
  <nav class="nav-bar scrolled" id="navBar">
    <div class="container">
      <div class="nav-bar-inner">
        <span class="nav-title" style="opacity:1">神秘实验室</span>
        <a href="index.html" class="nav-lab">← 返回导航</a>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <header class="lab-hero">
    <p class="lab-hero-label">Archive Terminal v1.0</p>
    <h1 class="lab-hero-title">ANIME ARCHIVE</h1>
    <p class="lab-hero-sub">动漫档案数据库</p>
    <div class="lab-stats">
      <div class="lab-stat">
        <div class="lab-stat-num" id="statTotal">--</div>
        <div class="lab-stat-label">Records</div>
      </div>
      <div class="lab-stat">
        <div class="lab-stat-num" id="statMonths">--</div>
        <div class="lab-stat-label">Archives</div>
      </div>
      <div class="lab-stat">
        <div class="lab-stat-num" id="statFuture">--</div>
        <div class="lab-stat-label">Pending</div>
      </div>
    </div>
  </header>

  <!-- Month Nodes along pillar -->
  <section class="archive-section">
    <div class="month-list" id="monthList"></div>
  </section>

  <!-- Cards zone -->
  <div class="cards-zone" id="cardsZone">
    <div class="cards-placeholder">SELECT ARCHIVE</div>
  </div>

  <!-- Back -->
  <div style="text-align:center;position:relative;z-index:2;padding-bottom:var(--spacing-lg)">
    <a href="index.html" class="lab-back-link">← 返回导航站</a>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p class="footer-text">© 2025 Y的acg导航站 · Anime Archive Terminal</p>
      <p class="footer-sub"><span>Archive data for reference only</span></p>
    </div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="data/anime-timeline.js?v=1"></script>
  <script src="js/lab.js?v=4"></script>
</body>
</html>
