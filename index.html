<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Y的acg导航站 - ACG二次元资源聚合导航，收录动漫、漫画、游戏、轻小说、音乐、壁纸等优质网站">
  <meta name="keywords" content="ACG导航,二次元导航,动漫导航,漫画导航,游戏导航,Y的acg导航站">
  <title>Y的acg导航站 - ACG二次元资源导航</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>
  <!-- ========== 头部区域 ========== -->
  <header class="header">
    <div class="container">
      <div class="header-inner">
        <a href="/" class="logo">
          <span class="logo-icon">🍃</span>
          <span class="logo-text">Y的acg导航站</span>
        </a>
        <div id="weatherWidget" class="weather-widget">
          <span class="weather-icon">☀️</span>
          <span class="weather-temp">--°</span>
          <span class="weather-city">加载中...</span>
        </div>
        <p class="header-desc">ACG二次元资源聚合导航 · 发现美好</p>
      </div>
    </div>
  </header>

  <!-- ========== 悬浮搜索栏（滚动时出现）========== -->
  <div id="stickySearch" class="sticky-search">
    <div class="container">
      <div class="sticky-search-inner">
        <span class="sticky-logo">🍃 Y的acg</span>
        <div class="search-box sticky-search-box">
          <input
            type="text"
            id="stickySearchInput"
            class="search-input"
            placeholder="搜索 ACG 网站..."
            autocomplete="off"
          >
          <button id="stickySearchBtn" class="search-btn">🔍</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== 搜索区域 ========== -->
  <section class="search-section">
    <div class="container">
      <div class="search-box">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="搜索你想要的 ACG 网站..."
          autocomplete="off"
        >
        <button id="searchBtn" class="search-btn">🔍 搜索</button>
      </div>
      <div id="searchResults" class="search-results" style="display:none;">
        <div class="search-results-header">
          <span id="searchResultCount"></span>
          <button id="clearSearch" class="clear-search-btn">✕ 清除</button>
        </div>
        <div id="searchResultList" class="search-result-list"></div>
      </div>
    </div>
  </section>

  <!-- ========== 公告栏 ========== -->
  <section class="notice-section">
    <div class="container">
      <div class="notice-bar">
        <span class="notice-icon">📢</span>
        <div class="notice-scroll">
          <span class="notice-text">
            欢迎来到Y的acg导航站！本站收录了 100+ ACG 优质网站，涵盖动漫、漫画、游戏、轻小说等分类，持续更新中~
          </span>
        </div>
      </div>
    </div>
  </section>

  <!-- ========== 历史浏览 ========== -->
  <section class="history-section">
    <div class="container">
      <div class="history-bar">
        <span class="history-label">🕐 最近浏览</span>
        <div id="historyList" class="history-list">
          <span class="history-empty">暂无浏览记录</span>
        </div>
        <button id="clearHistory" class="history-clear" style="display:none;">清空</button>
      </div>
    </div>
  </section>

  <!-- ========== 分类导航主体 ========== -->
  <main class="main">
    <div class="container">
      <div id="categoryGrid" class="category-grid">
        <!-- 由 JS 动态生成 -->
      </div>
    </div>
  </main>

  <!-- ========== 分类详情弹窗 ========== -->
  <div id="categoryModal" class="modal" style="display:none;">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle" class="modal-title"></h2>
        <button id="modalClose" class="modal-close">✕</button>
      </div>
      <div id="modalBody" class="modal-body">
        <!-- 由 JS 动态生成 -->
      </div>
    </div>
  </div>

  <!-- ========== 主题切换 & 回到顶部 ========== -->
  <div class="theme-switcher">
    <button id="backToTop" class="back-to-top" title="回到顶部">⬆</button>
    <button id="themeToggle" class="theme-toggle-btn" title="切换主题">🎨</button>
    <div id="themePalette" class="theme-palette">
      <span class="theme-dot green active" data-theme="green" title="薄荷绿"></span>
      <span class="theme-dot pink" data-theme="pink" title="樱花粉"></span>
      <span class="theme-dot blue" data-theme="blue" title="天空蓝"></span>
      <span class="theme-dot dark" data-theme="dark" title="暗夜模式"></span>
    </div>
  </div>

  <!-- ========== 页脚 ========== -->
  <footer class="footer">
    <div class="container">
      <p class="footer-text">© 2025 Y的acg导航站 · 为 ACG 爱好者而生</p>
      <p class="footer-sub">
        <span>本站仅收录网络公开站点链接，版权归原作者所有</span>
      </p>
    </div>
  </footer>

  <!-- ========== 脚本 ========== -->
  <script src="data/sites.js?v=2"></script>
  <script src="js/main.js?v=2"></script>
</body>
</html>
